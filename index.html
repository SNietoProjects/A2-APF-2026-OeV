<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Tema 2 — Cortes Generales, Gobierno y Administración | Opositar en Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --naranja: #d97706;
    --naranja-claro: #fef3c7;
    --naranja-borde: #f59e0b;
    --azul-oscuro: #1e293b;
    --texto: #374151;
    --texto-suave: #6b7280;
    --borde: #e5e7eb;
    --fondo: #fafaf9;
    --blanco: #ffffff;
    --verde: #166534;
    --verde-bg: #f0fdf4;
    --verde-borde: #86efac;
    --rojo: #991b1b;
    --rojo-bg: #fef2f2;
    --rojo-borde: #fca5a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    background: var(--blanco);
    border-bottom: 1px solid var(--borde);
    padding: 0;
  }
  .header-top {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.4rem 1.5rem 1rem;
    display: flex;
    align-items: flex-start;
    gap: 1.2rem;
  }
  .header-logo {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .header-textos { flex: 1; }
  .header-site {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--naranja);
    font-weight: 600;
    margin-bottom: 3px;
  }
  .header-titulo {
    font-family: 'Lora', serif;
    font-size: clamp(1.25rem, 3.5vw, 1.75rem);
    font-weight: 700;
    color: var(--azul-oscuro);
    line-height: 1.2;
  }
  .header-sub {
    font-size: 0.88rem;
    color: var(--texto-suave);
    margin-top: 4px;
  }
  .header-meta {
    background: var(--naranja-claro);
    border-top: 1px solid #fde68a;
    padding: 0.55rem 1.5rem;
  }
  .header-meta-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    font-size: 0.83rem;
    color: #92400e;
    font-weight: 500;
  }
  .header-meta-inner span::before { margin-right: 4px; }

  /* ── BARRA PROGRESO ── */
  .barra-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--blanco);
    border-bottom: 1px solid var(--borde);
    padding: 0.6rem 1.5rem;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }
  .barra-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .barra-track {
    flex: 1;
    height: 6px;
    background: #f3f4f6;
    border-radius: 99px;
    overflow: hidden;
  }
  .barra-fill {
    height: 100%;
    background: var(--naranja);
    border-radius: 99px;
    transition: width 0.35s ease;
    width: 0%;
  }
  .barra-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--azul-oscuro);
    white-space: nowrap;
    min-width: 52px;
  }
  .barra-score {
    font-size: 13px;
    color: var(--texto-suave);
    white-space: nowrap;
  }
  .barra-score .ok { color: var(--verde); font-weight: 600; }
  .barra-score .ko { color: var(--rojo); font-weight: 600; }

  /* ── MAIN ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
  }

  /* ── CARD PREGUNTA ── */
  .card {
    background: var(--blanco);
    border: 1px solid var(--borde);
    border-radius: 10px;
    padding: 1.5rem 1.6rem;
    margin-bottom: 1.4rem;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.06); }

  .card-num {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--naranja);
    margin-bottom: 0.5rem;
  }
  .card-pregunta {
    font-family: 'Lora', serif;
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.55;
    color: var(--azul-oscuro);
    margin-bottom: 1.1rem;
  }

  /* ── OPCIONES ── */
  .opciones { display: flex; flex-direction: column; gap: 0.45rem; }
  .opcion {
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
    padding: 0.7rem 1rem;
    border: 1.5px solid var(--borde);
    border-radius: 7px;
    cursor: pointer;
    background: var(--blanco);
    text-align: left;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.93rem;
    color: var(--texto);
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .opcion:hover:not(:disabled) {
    border-color: var(--naranja-borde);
    background: var(--naranja-claro);
  }
  .opcion .letra {
    font-weight: 700;
    color: var(--naranja);
    min-width: 18px;
    font-size: 0.85rem;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .opcion.correcta {
    border-color: var(--verde-borde);
    background: var(--verde-bg);
    color: var(--verde);
  }
  .opcion.correcta .letra { color: #15803d; }
  .opcion.incorrecta {
    border-color: var(--rojo-borde);
    background: var(--rojo-bg);
    color: var(--rojo);
  }
  .opcion.incorrecta .letra { color: var(--rojo); }
  .opcion:disabled { cursor: default; }

  /* ── EXPLICACIÓN ── */
  .explicacion {
    display: none;
    margin-top: 1rem;
    padding: 0.9rem 1rem 0.9rem 1.1rem;
    background: #fffbeb;
    border-left: 3px solid var(--naranja);
    border-radius: 0 6px 6px 0;
    font-size: 0.875rem;
    line-height: 1.65;
    color: var(--texto);
  }
  .explicacion.visible { display: block; animation: fadeIn 0.22s ease; }
  .explicacion strong { color: var(--azul-oscuro); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESULTADO FINAL ── */
  .resultado {
    display: none;
    background: var(--blanco);
    border: 1px solid var(--borde);
    border-radius: 12px;
    padding: 2.5rem 2rem 2rem;
    margin: 1.5rem 0 2rem;
    text-align: center;
  }
  .resultado.visible { display: block; animation: fadeIn 0.3s ease; }
  .resultado-eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--naranja);
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .resultado h2 {
    font-family: 'Lora', serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--azul-oscuro);
    margin-bottom: 0.3rem;
  }
  .resultado-nota {
    font-size: 3.2rem;
    font-weight: 700;
    color: var(--azul-oscuro);
    line-height: 1;
    margin: 1rem 0 0.3rem;
    font-family: 'Lora', serif;
  }
  .resultado-nota span { color: var(--naranja); }
  .calif-badge {
    display: inline-block;
    padding: 5px 16px;
    border-radius: 99px;
    font-size: 0.9rem;
    font-weight: 600;
    margin: 0.6rem 0 1.5rem;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin: 0 0 1.5rem;
  }
  .stat {
    background: var(--fondo);
    border: 1px solid var(--borde);
    border-radius: 8px;
    padding: 0.9rem 0.5rem;
  }
  .stat-num { font-size: 1.9rem; font-weight: 700; font-family: 'Lora', serif; }
  .stat-lab { font-size: 0.78rem; color: var(--texto-suave); margin-top: 2px; }
  .resultado-hint {
    font-size: 0.85rem;
    color: var(--texto-suave);
    margin-bottom: 1.2rem;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0.7rem 1.6rem;
    border-radius: 7px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
    text-decoration: none;
  }
  .btn-naranja {
    background: var(--naranja);
    color: white;
  }
  .btn-naranja:hover { background: #b45309; transform: translateY(-1px); }

  /* ── SEPARADOR ── */
  .divider {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--texto-suave);
    margin: 2rem 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--borde);
  }

  @media (max-width: 580px) {
    main { padding: 1.2rem 1rem 4rem; }
    .card { padding: 1.1rem 1.1rem; }
    .stats { grid-template-columns: 1fr 1fr; }
    .header-top { padding: 1rem; gap: 0.8rem; }
    .header-meta { padding: 0.5rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <img class="header-logo"
      src="https://opositorgva.wordpress.com/wp-content/uploads/2024/04/cropped-opositar-en-valencia-logo-sin-fondo.png"
      alt="Opositar en Valencia"
      onerror="this.style.display='none'">
    <div class="header-textos">
      <div class="header-site">Opositar en Valencia · GVA</div>
      <div class="header-titulo">Tema 2 — Cortes Generales, Gobierno y Administración</div>
      <div class="header-sub">Títulos III, IV y V de la Constitución Española · Subalterno APT-APF</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="header-meta-inner">
      <span>📋 50 preguntas</span>
      <span>🎯 Nivel medio-alto</span>
      <span>🔀 Orden aleatorio en cada intento</span>
      <span>✅ Explicación en cada respuesta</span>
    </div>
  </div>
</header>

<div class="barra-wrap">
  <div class="barra-inner">
    <div class="barra-track"><div class="barra-fill" id="barraFill"></div></div>
    <span class="barra-num" id="barraNum">0 / 50</span>
    <span class="barra-score"><span class="ok" id="scoreOk">✓ 0</span> &nbsp;<span class="ko" id="scoreKo">✗ 0</span></span>
  </div>
</div>

<main id="mainContent"></main>

<script>
const BANCO = [
  {
    p: "Según el artículo 66 CE, ¿cuál es la composición de las Cortes Generales?",
    ops: ["El Congreso de los Diputados y el Tribunal Constitucional", "El Congreso de los Diputados y el Senado", "El Congreso de los Diputados, el Senado y el Consejo de Estado", "El Congreso de los Diputados, el Senado y el Defensor del Pueblo"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 66.1 CE establece que las Cortes Generales están formadas por el Congreso de los Diputados y el Senado. El Tribunal Constitucional, el Consejo de Estado y el Defensor del Pueblo son órganos constitucionales distintos, con funciones propias ajenas a la composición de las Cortes."
  },
  {
    p: "El artículo 66.2 CE atribuye a las Cortes Generales tres grandes funciones. ¿Cuál de las siguientes NO figura entre ellas?",
    ops: ["Ejercer la potestad legislativa del Estado", "Aprobar los Presupuestos Generales del Estado", "Controlar la acción del Gobierno", "Nombrar a los magistrados del Tribunal Supremo"],
    c: 3,
    exp: "<strong>Respuesta correcta: D.</strong> El art. 66.2 CE enumera como funciones de las Cortes: potestad legislativa, aprobación de Presupuestos y control del Gobierno, más las que la Constitución les atribuya. El nombramiento de magistrados del Tribunal Supremo corresponde al Consejo General del Poder Judicial, no a las Cortes."
  },
  {
    p: "¿Qué consecuencia tiene la inviolabilidad de las Cortes Generales proclamada en el artículo 66.3 CE?",
    ops: ["Que sus miembros no pueden ser detenidos nunca", "Que nadie puede atentar jurídicamente contra su existencia, composición o funciones como institución", "Que sus sesiones son siempre secretas", "Que sus acuerdos no pueden ser impugnados ante ningún tribunal"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> La inviolabilidad institucional del art. 66.3 CE protege a las Cortes como institución frente a cualquier acto que pretenda subvertir su existencia, composición o funciones. Es diferente de la inviolabilidad personal de los parlamentarios (art. 71.1 CE) y de la inmunidad parlamentaria (art. 71.2 CE)."
  },
  {
    p: "Conforme al artículo 67 CE, ¿puede un Diputado al Congreso ser simultáneamente miembro del Senado?",
    ops: ["Sí, si su partido así lo decide", "Sí, pero solo durante el primer año de mandato", "No, nadie puede ser miembro de las dos Cámaras simultáneamente", "Sí, pero pierde la asignación de una de las Cámaras"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 67.1 CE prohíbe taxativamente ser miembro de las dos Cámaras simultáneamente. Tampoco permite acumular el acta de una Asamblea de Comunidad Autónoma con la de Diputado al Congreso. Se trata de una incompatibilidad de rango constitucional."
  },
  {
    p: "Según el artículo 67.2 CE, los miembros de las Cortes Generales no estarán ligados por mandato imperativo. ¿Qué significa esto en la práctica?",
    ops: ["Que pueden ausentarse de las votaciones sin justificación", "Que no están obligados a seguir las instrucciones de sus electores ni de sus grupos parlamentarios a la hora de votar, siendo su voto libre", "Que no deben cumplir las órdenes de la Mesa de la Cámara", "Que pueden cambiar de grupo parlamentario en cualquier momento sin restricciones"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> La prohibición de mandato imperativo implica que los parlamentarios representan a toda la Nación (no solo a sus electores) y no pueden recibir instrucciones vinculantes de partidos, grupos o electores. El voto no puede ser objeto de compromiso previo exigible. Es una garantía de la función representativa."
  },
  {
    p: "¿Entre qué límites se sitúa el número de Diputados del Congreso según el artículo 68.1 CE?",
    ops: ["Mínimo 250, máximo 350", "Mínimo 300, máximo 400", "Mínimo 350, máximo 450", "Mínimo 200, máximo 300"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 68.1 CE fija que el Congreso se compone de un mínimo de 300 y un máximo de 400 Diputados. Actualmente la Ley Orgánica del Régimen Electoral General establece 350 Diputados, cifra que se sitúa dentro del margen constitucional."
  },
  {
    p: "Según el artículo 68.2 CE, ¿cuál es la circunscripción electoral para el Congreso de los Diputados?",
    ops: ["El municipio", "La Comunidad Autónoma", "La provincia, siendo Ceuta y Melilla circunscripciones propias con un Diputado cada una", "La región histórica"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 68.2 CE establece la provincia como circunscripción electoral. Ceuta y Melilla tienen su propia representación con un Diputado cada una. La ley distribuye el total de Diputados asignando una representación mínima inicial a cada circunscripción y el resto en proporción a la población."
  },
  {
    p: "¿Cuál es el mandato del Congreso de los Diputados y qué ocurre con el mandato de los Diputados el día de la disolución anticipada de la Cámara?",
    ops: ["Cuatro años; el mandato continúa hasta la constitución del nuevo Congreso", "Cuatro años; el mandato termina el día de la disolución de la Cámara", "Cinco años; el mandato termina el día de la disolución de la Cámara", "Cuatro años; el mandato solo termina transcurridos los cuatro años, no antes"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 68.4 CE dispone que el Congreso es elegido por cuatro años y que el mandato de los Diputados termina cuatro años después de su elección o el día de la disolución de la Cámara, lo que ocurra antes. La disolución anticipada pone fin al mandato individual de cada Diputado."
  },
  {
    p: "En qué plazo deben convocarse las elecciones al Congreso tras la terminación del mandato, según el artículo 68.6 CE?",
    ops: ["Entre los quince días y los treinta días", "Entre los treinta días y los sesenta días", "En los noventa días siguientes", "En los cuarenta y cinco días siguientes"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 68.6 CE establece que las elecciones tendrán lugar entre los treinta y los sesenta días desde la terminación del mandato. Una vez celebradas, el Congreso electo deberá ser convocado dentro de los veinticinco días siguientes a la celebración de las elecciones."
  },
  {
    p: "¿Qué naturaleza tiene el Senado según el artículo 69.1 CE?",
    ops: ["La Cámara de control del ejecutivo", "La Cámara de representación territorial", "La Cámara de revisión legislativa", "La Cámara de representación de los partidos políticos"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 69.1 CE define expresamente al Senado como la Cámara de representación territorial. Esta definición constitucional justifica, entre otras cosas, que las Comunidades Autónomas designen senadores de forma adicional a los elegidos directamente en las provincias."
  },
  {
    p: "¿Cuántos Senadores se eligen por sufragio directo en cada provincia peninsular, según el artículo 69.2 CE?",
    ops: ["Dos senadores por provincia", "Tres senadores por provincia", "Cuatro senadores por provincia", "Un número variable según la población de la provincia"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 69.2 CE establece que en cada provincia se elegirán cuatro Senadores por sufragio universal, libre, igual, directo y secreto. Esta regla es uniforme para todas las provincias peninsulares, sin atender a criterios de población, lo que garantiza la representación territorial igualitaria."
  },
  {
    p: "Según el artículo 69.5 CE, ¿cómo se determina el número de Senadores que designa cada Comunidad Autónoma?",
    ops: ["Un Senador fijo por Comunidad Autónoma, con independencia de la población", "Un Senador y otro más por cada millón de habitantes de su respectivo territorio", "Dos Senadores fijos más uno por cada 500.000 habitantes", "Según el porcentaje de PIB de cada Comunidad Autónoma"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 69.5 CE establece la fórmula de un Senador base más uno adicional por cada millón de habitantes. La designación corresponde a la Asamblea legislativa o al órgano colegiado superior de la Comunidad, según los Estatutos, que deben asegurar la adecuada representación proporcional."
  },
  {
    p: "Conforme al artículo 70.1 CE, ¿qué cargo está expresamente incluido entre los supuestos de inelegibilidad e incompatibilidad parlamentaria?",
    ops: ["El Presidente del Gobierno", "El Defensor del Pueblo", "Los miembros de la Junta de Gobierno del Banco de España", "Los Secretarios de Estado"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 70.1 CE enumera entre los supuestos de inelegibilidad e incompatibilidad: componentes del Tribunal Constitucional, altos cargos de la Administración (salvo miembros del Gobierno), el Defensor del Pueblo, Magistrados, Jueces y Fiscales en activo, militares y miembros de las Fuerzas de Seguridad en activo, y miembros de las Juntas Electorales."
  },
  {
    p: "La inviolabilidad parlamentaria del artículo 71.1 CE protege a los Diputados y Senadores por las opiniones manifestadas en el ejercicio de sus funciones. ¿Es esta protección temporal o permanente?",
    ops: ["Solo durante el período de mandato", "Solo durante las sesiones plenarias", "Es permanente: protege incluso una vez finalizado el mandato por las opiniones emitidas en su ejercicio", "Es permanente solo respecto de las opiniones emitidas en el Pleno, no en Comisiones"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> La inviolabilidad del art. 71.1 CE protege las opiniones manifestadas en el ejercicio de las funciones parlamentarias y tiene carácter permanente: el parlamentario no puede ser perseguido por ellas ni durante ni después del mandato. Es distinta de la inmunidad (art. 71.2 CE), que es temporal."
  },
  {
    p: "Según el artículo 71.2 CE, ¿cuándo puede ser detenido un Diputado o Senador durante el período de su mandato?",
    ops: ["Nunca, gozan de inmunidad total", "Solo en caso de flagrante delito", "Cuando así lo acuerde el Tribunal Supremo sin necesidad de suplicatorio", "Cuando lo autorice el Gobierno mediante decreto"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 71.2 CE establece que durante el mandato los parlamentarios gozan de inmunidad y solo podrán ser detenidos en caso de flagrante delito. Para ser inculpados o procesados se requiere la previa autorización (suplicatorio) de la Cámara respectiva."
  },
  {
    p: "¿Cuáles son los dos períodos ordinarios de sesiones de las Cámaras según el artículo 73 CE?",
    ops: ["De enero a abril y de julio a octubre", "De septiembre a diciembre y de febrero a junio", "De octubre a enero y de marzo a julio", "De septiembre a enero y de marzo a junio"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 73.1 CE fija los dos períodos ordinarios de sesiones: el primero de septiembre a diciembre y el segundo de febrero a junio. Fuera de estos períodos las Cámaras pueden reunirse en sesiones extraordinarias, que deben convocarse con un orden del día determinado."
  },
  {
    p: "¿Quién puede solicitar la convocatoria de sesiones extraordinarias de las Cámaras según el artículo 73.2 CE?",
    ops: ["Solo el Gobierno", "El Gobierno, la Diputación Permanente o la mayoría absoluta de los miembros de cualquiera de las Cámaras", "El Presidente del Congreso, el Presidente del Senado o el Gobierno", "La mayoría de tres quintos de cualquiera de las Cámaras"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> Según el art. 73.2 CE, las sesiones extraordinarias pueden ser solicitadas por el Gobierno, la Diputación Permanente o la mayoría absoluta de los miembros de cualquiera de las Cámaras. Las sesiones extraordinarias deben convocarse sobre un orden del día determinado y clausurarse cuando este se agote."

// ── ALEATORIZACIÓN ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepararPreguntas() {
  const mezcladas = shuffle(BANCO);
  return mezcladas.map(q => {
    const respuestaTextoCorrecta = q.ops[q.c];
    const opsNuevas = shuffle(q.ops);
    const nuevoC = opsNuevas.indexOf(respuestaTextoCorrecta);
    return { p: q.p, ops: opsNuevas, c: nuevoC, exp: q.exp };
  });
}

let preguntas = [];
let respondidas = 0, correctas = 0, incorrectas = 0;

function actualizarBarra() {
  const pct = preguntas.length ? (respondidas / preguntas.length) * 100 : 0;
  document.getElementById('barraFill').style.width = pct + '%';
  document.getElementById('barraNum').textContent = respondidas + ' / ' + preguntas.length;
  document.getElementById('scoreOk').textContent = '✓ ' + correctas;
  document.getElementById('scoreKo').textContent = '✗ ' + incorrectas;
}

function responder(qi, oi) {
  const q = preguntas[qi];
  const btns = document.querySelectorAll('[data-qi="' + qi + '"]');
  btns.forEach(b => b.disabled = true);
  btns.forEach((b, j) => {
    if (j === q.c) b.classList.add('correcta');
    else if (j === oi && oi !== q.c) b.classList.add('incorrecta');
  });
  document.getElementById('exp-' + qi).classList.add('visible');
  respondidas++;
  if (oi === q.c) correctas++; else incorrectas++;
  actualizarBarra();
  if (respondidas === preguntas.length) setTimeout(mostrarResultado, 700);
}

function mostrarResultado() {
  const pct = Math.round((correctas / preguntas.length) * 100);
  document.getElementById('resPunt').innerHTML = correctas + ' <span>/ ' + preguntas.length + '</span>';
  document.getElementById('resCorr').textContent = correctas;
  document.getElementById('resIncorr').textContent = incorrectas;
  document.getElementById('resPct').textContent = pct + '%';

  let txt, col, bg;
  if (pct >= 90)      { txt = '🏆 Sobresaliente'; col = '#166534'; bg = '#f0fdf4'; }
  else if (pct >= 75) { txt = '✅ Notable';        col = '#1e3a5f'; bg = '#eff6ff'; }
  else if (pct >= 60) { txt = '📘 Aprobado';       col = '#92400e'; bg = '#fffbeb'; }
  else                { txt = '❌ Insuficiente — ¡Sigue practicando!'; col = '#991b1b'; bg = '#fef2f2'; }

  document.getElementById('resCalif').innerHTML =
    '<span class="calif-badge" style="background:' + bg + ';color:' + col + '">' + txt + '</span>';

  const el = document.getElementById('resultado');
  el.classList.add('visible');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function render() {
  respondidas = 0; correctas = 0; incorrectas = 0;
  preguntas = prepararPreguntas();
  actualizarBarra();

  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  const letras = ['A','B','C','D'];

  preguntas.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const opsHTML = q.ops.map((op, j) =>
      `<button class="opcion" data-qi="${i}" onclick="responder(${i},${j})">
        <span class="letra">${letras[j]})</span><span>${op}</span>
      </button>`
    ).join('');

    card.innerHTML =
      `<div class="card-num">Pregunta ${i + 1} de ${preguntas.length}</div>
       <div class="card-pregunta">${q.p}</div>
       <div class="opciones">${opsHTML}</div>
       <div class="explicacion" id="exp-${i}">${q.exp}</div>`;

    main.appendChild(card);
  });

  // Separador y resultado final
  const sep = document.createElement('div');
  sep.className = 'divider';
  sep.textContent = 'Fin del test';
  main.appendChild(sep);

  const res = document.createElement('div');
  res.className = 'resultado';
  res.id = 'resultado';
  res.innerHTML =
    `<div class="resultado-eyebrow">Resultado final</div>
     <h2>Test completado</h2>
     <div class="resultado-nota" id="resPunt">0 <span>/ 50</span></div>
     <div id="resCalif"></div>
     <div class="stats">
       <div class="stat"><div class="stat-num" id="resCorr" style="color:#166534">0</div><div class="stat-lab">Correctas</div></div>
       <div class="stat"><div class="stat-num" id="resIncorr" style="color:#991b1b">0</div><div class="stat-lab">Incorrectas</div></div>
       <div class="stat"><div class="stat-num" id="resPct">0%</div><div class="stat-lab">% aciertos</div></div>
     </div>
     <p class="resultado-hint">Desplázate hacia arriba para revisar las explicaciones de cada pregunta.</p>
     <button class="btn btn-naranja" onclick="render(); window.scrollTo({top:0,behavior:'smooth'})">↺ Repetir con nuevo orden</button>`;
  main.appendChild(res);
}

render();
</script>
